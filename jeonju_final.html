<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전주국제영화제 시간표</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#fff;color:#111;padding:1rem;}

.tabs{display:flex;border-bottom:0.5px solid #e0e0e0;margin-bottom:1.25rem;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:8px 14px;font-size:13px;font-weight:500;color:#888;border-bottom:2px solid transparent;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;}
.tab.active{color:#111;border-bottom:2px solid #111;}
.panel{display:none;}.panel.active{display:block;}

.col-headers{display:grid;grid-template-columns:36px 1fr 1fr;gap:4px;margin-bottom:6px;}
.ch{text-align:center;font-size:12px;font-weight:500;padding:6px;border-radius:8px;}
.cha{background:#E6F1FB;color:#0C447C;}.chs{background:#FBEAF0;color:#72243E;}

.tl-wrap{display:flex;}
.ax{display:flex;flex-direction:column;width:36px;flex-shrink:0;}
.tk{display:flex;align-items:flex-start;font-size:10px;color:#bbb;padding-top:2px;justify-content:flex-end;padding-right:8px;}
.cols{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.col{position:relative;border-left:0.5px solid #e8e8e8;}
.ec{position:relative;border-left:0.5px solid #e8e8e8;opacity:0.25;}
.hl{position:absolute;left:0;right:0;height:0.5px;background:#f0f0f0;}
.hl.mj{background:#ddd;}
.gb{position:absolute;left:3px;right:3px;background:#f5f5f3;border-radius:4px;display:flex;align-items:center;justify-content:center;}
.gl{font-size:9px;color:#bbb;}

.fb{position:absolute;left:3px;right:3px;border-radius:5px;padding:4px 6px;overflow:hidden;cursor:pointer;transition:filter 0.1s;}
.fb:hover{filter:brightness(0.93);}
.fb.clipped{border-radius:5px 5px 0 0;border-bottom:2px dashed rgba(0,0,0,0.15);}
.ft{font-size:11px;font-weight:600;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.3;}
.fv{font-size:9px;margin-top:2px;opacity:0.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fm{font-size:9px;margin-top:1px;opacity:0.65;}
.fbg{font-size:8px;font-weight:600;margin-top:2px;opacity:0.85;}
.clash-ring{outline:2px solid #E24B4A;outline-offset:-2px;}
.night-tail{border-radius:0 0 5px 5px;border-top:2px dashed rgba(0,0,0,0.12);padding:4px 6px;}

.add-btn{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:8px;padding:8px;border:0.5px dashed #ccc;border-radius:8px;cursor:pointer;font-size:12px;color:#999;background:none;width:100%;transition:background 0.1s;}
.add-btn:hover{background:#f5f5f3;}

.sr{display:grid;grid-template-columns:36px 1fr 1fr;gap:4px;margin-top:10px;}
.sc{border-radius:8px;padding:8px 10px;font-size:11px;color:#888;border:0.5px solid #e0e0e0;}
.sc strong{display:block;font-size:13px;font-weight:500;color:#111;margin-bottom:1px;}
.se{border-radius:8px;padding:8px 10px;font-size:11px;color:#bbb;border:0.5px dashed #e0e0e0;text-align:center;}
.ib{margin-top:8px;padding:8px 12px;border-radius:8px;font-size:11px;}
.ck{background:#FCEBEB;color:#A32D2D;}.ok{background:#EAF3DE;color:#27500A;}.sl{background:#f5f5f3;color:#888;}
.tb{margin-top:6px;padding:8px 12px;border-radius:8px;font-size:11px;background:#f5f5f3;color:#888;}

/* 팝업 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.overlay.on{display:flex;}
.popup{background:#fff;border-radius:16px 16px 0 0;padding:20px 16px 32px;width:100%;max-width:480px;}
.popup-title{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.popup-close{background:none;border:none;font-size:20px;color:#999;cursor:pointer;line-height:1;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;color:#888;margin-bottom:4px;font-weight:500;}
.field input, .field select{width:100%;padding:9px 12px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#111;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-row{display:flex;gap:8px;margin-top:16px;}
.btn-save{flex:1;padding:11px;background:#111;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;}
.btn-del{padding:11px 16px;background:#FCEBEB;color:#A32D2D;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;}
.color-row{display:flex;gap:6px;flex-wrap:wrap;}
.color-swatch{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;}
.color-swatch.sel{border-color:#111;}

.cp{background:#EEEDFE;color:#3C3489;}.ct{background:#E1F5EE;color:#085041;}.cc{background:#FAECE7;color:#993C1D;}
.cb{background:#E6F1FB;color:#0C447C;}.cpk{background:#FBEAF0;color:#72243E;}.cam{background:#FAEEDA;color:#633806;}
.cg{background:#F1EFE8;color:#444441;}.cgr{background:#EAF3DE;color:#27500A;}

.add-day-row{display:flex;justify-content:flex-end;margin-bottom:8px;}
.add-day-btn{font-size:11px;color:#888;background:none;border:0.5px solid #ddd;border-radius:6px;padding:4px 10px;cursor:pointer;}
</style>
</head>
<body>

<div class="tabs" id="tabs"></div>
<div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
  <button class="add-day-btn" onclick="addDay()">+ 날짜 추가</button>
</div>
<div id="panels"></div>

<!-- 팝업 -->
<div class="overlay" id="overlay" onclick="closePopup(event)">
  <div class="popup">
    <div class="popup-title">
      <span id="popupTitle">영화 편집</span>
      <button class="popup-close" onclick="closePopupDirect()">✕</button>
    </div>
    <div class="field">
      <label>제목</label>
      <input id="fTitle" type="text" placeholder="영화 제목">
    </div>
    <div class="field field-row">
      <div>
        <label>시작 시간</label>
        <input id="fStart" type="time">
      </div>
      <div>
        <label>종료 시간</label>
        <input id="fEnd" type="time">
      </div>
    </div>
    <div class="field">
      <label>상영관</label>
      <input id="fVenue" type="text" placeholder="예: CGV전주고사 2관">
    </div>
    <div class="field">
      <label>섹션</label>
      <input id="fBadge" type="text" placeholder="예: 홍콩귀환, 국제경쟁">
    </div>
    <div class="field">
      <label>색상</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="btn-row">
      <button class="btn-save" onclick="saveFilm()">저장</button>
      <button class="btn-del" id="delBtn" onclick="deleteFilm()">삭제</button>
    </div>
  </div>
</div>

<script>
const PX=52;
const COLS=['cp','ct','cc','cb','cpk','cam','cg','cgr'];
const COL_BG={'cp':'#EEEDFE','ct':'#E1F5EE','cc':'#FAECE7','cb':'#E6F1FB','cpk':'#FBEAF0','cam':'#FAEEDA','cg':'#F1EFE8','cgr':'#EAF3DE'};

let activeDay=0;
let editTarget=null; // {dayIdx, person, filmIdx} or null=new

const DAYS=[
  {label:'4/30 목',startH:9,
   ha:[
    {title:'동부인',time:'10:00–11:37',start:600,end:697,col:'cp',badge:'홍콩귀환',venue:'CGV전주고사 2관'},
    {title:'미스투라',time:'13:30–15:11',start:810,end:911,col:'ct',badge:'특별상영',venue:'메가박스 전주객사 5관'},
    {title:'관리처분계획—미아리 텍사스 편',time:'16:30–18:30',start:990,end:1110,col:'cgr',badge:'코리안시네마',venue:'CGV전주고사 4관'},
    {title:'붉은 안경',time:'20:30–22:31',start:1230,end:1351,col:'cb',badge:'시네필전주',venue:'CGV전주고사 2관'},
   ],sy:[]},
  {label:'5/1 금',startH:9,
   ha:[
    {title:'AI 버추얼 프로덕션 세미나',time:'15:00–17:00',start:900,end:1020,col:'cg',badge:'세미나',venue:'CGV전주고사 1관'},
    {title:'팔림프세스트: 이름에 관한 이야기',time:'17:00–18:49',start:1020,end:1129,col:'cp',badge:'홍콩귀환',venue:'CGV전주고사 2관'},
    {title:'심야상영 1',time:'23:59–익일 05:27',start:1439,end:1440,col:'cam',badge:'불면의 밤',venue:'CGV전주고사 1관',clipped:true},
   ],
   sy:[
    {title:'네 멋대로 해라!! 영웅계획',time:'10:00–11:24',start:600,end:684,col:'cb',badge:'시네필전주',venue:'CGV전주고사 3관'},
    {title:'AI 버추얼 프로덕션 세미나',time:'15:00–17:00',start:900,end:1020,col:'cg',badge:'세미나',venue:'CGV전주고사 1관'},
    {title:'팔림프세스트: 이름에 관한 이야기',time:'17:00–18:49',start:1020,end:1129,col:'cp',badge:'홍콩귀환',venue:'CGV전주고사 2관'},
    {title:'부러진 화살',time:'21:30–23:13',start:1290,end:1393,col:'ct',badge:'특별전',venue:'메가박스 전주객사 7관'},
    {title:'심야상영 1',time:'23:59–익일 05:27',start:1439,end:1440,col:'cam',badge:'불면의 밤',venue:'CGV전주고사 1관',clipped:true},
   ]},
  {label:'5/2 토',startH:17,
   ha:[],
   sy:[
    {title:'암탉의 모험',time:'18:00–19:37',start:1080,end:1177,col:'cb',badge:'월드시네마',venue:'CGV전주고사 2관'},
    {title:'크로노바이저',time:'21:30–23:09',start:1290,end:1389,col:'cc',badge:'국제경쟁',venue:'CGV전주고사 7관'},
   ]},
  {label:'5/3 일',startH:13,
   ha:[],
   sy:[
    {title:'6주 후',time:'14:30–16:09',start:870,end:969,col:'cc',badge:'국제경쟁',venue:'CGV전주고사 7관'},
   ]},
  {label:'5/4 월',startH:9,
   ha:[
    {title:'돌아가신 부모님께 드리는 편지',time:'10:00–11:52',start:600,end:712,col:'cp',badge:'마스터즈',venue:'메가박스 전주객사 10관'},
    {title:'미치유키: 시간의 목소리',time:'14:30–15:49',start:870,end:949,col:'cc',badge:'국제경쟁',venue:'CGV전주고사 7관'},
   ],sy:[]},
  {label:'5/5 화',startH:9,
   ha:[
    {title:'기묘한 이야기들',time:'10:00–14:24',start:600,end:864,col:'cpk',badge:'시네필전주',venue:'메가박스 전주객사 3관'},
    {title:'또 다른 여름의 꿈',time:'17:00–18:10',start:1020,end:1090,col:'cc',badge:'국제경쟁',venue:'CGV전주고사 7관'},
   ],sy:[]},
];

function toMins(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function toTime(m){const h=Math.floor(m/60),mm=m%60;return`${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;}
function overlaps(a,b){return a.start<b.end&&b.start<a.end;}
function fmtG(m){if(m<60)return m+'분 공백';const h=Math.floor(m/60),r=m%60;return r?h+'시간 '+r+'분 공백':h+'시간 공백';}

function openPopup(dayIdx, person, filmIdx){
  editTarget={dayIdx,person,filmIdx};
  const isNew=filmIdx===-1;
  document.getElementById('popupTitle').textContent=isNew?'영화 추가':'영화 편집';
  document.getElementById('delBtn').style.display=isNew?'none':'';

  const colorRow=document.getElementById('colorRow');
  colorRow.innerHTML=COLS.map(c=>`<div class="color-swatch ${c}" data-col="${c}" onclick="selectColor('${c}')"></div>`).join('');

  if(!isNew){
    const f=DAYS[dayIdx][person][filmIdx];
    document.getElementById('fTitle').value=f.title;
    document.getElementById('fStart').value=toTime(f.start);
    document.getElementById('fEnd').value=f.end>=1440?'23:59':toTime(f.end);
    document.getElementById('fVenue').value=f.venue||'';
    document.getElementById('fBadge').value=f.badge||'';
    selectColor(f.col);
  } else {
    document.getElementById('fTitle').value='';
    document.getElementById('fStart').value='';
    document.getElementById('fEnd').value='';
    document.getElementById('fVenue').value='';
    document.getElementById('fBadge').value='';
    selectColor('cp');
  }
  document.getElementById('overlay').classList.add('on');
}

function selectColor(col){
  document.querySelectorAll('.color-swatch').forEach(s=>{
    s.classList.toggle('sel',s.dataset.col===col);
  });
}

function getSelectedColor(){
  const sel=document.querySelector('.color-swatch.sel');
  return sel?sel.dataset.col:'cp';
}

function closePopup(e){if(e.target===document.getElementById('overlay'))closePopupDirect();}
function closePopupDirect(){document.getElementById('overlay').classList.remove('on');}

function saveFilm(){
  const title=document.getElementById('fTitle').value.trim();
  const startStr=document.getElementById('fStart').value;
  const endStr=document.getElementById('fEnd').value;
  if(!title||!startStr||!endStr){alert('제목, 시작/종료 시간을 입력해주세요.');return;}
  const start=toMins(startStr);
  let end=toMins(endStr);
  const clipped=end<=start;
  if(end<=start)end=1440;
  const venue=document.getElementById('fVenue').value.trim();
  const badge=document.getElementById('fBadge').value.trim();
  const col=getSelectedColor();
  const time=`${startStr}–${clipped?'익일 05:27':endStr}`;
  const film={title,time,start,end,col,badge,venue,clipped:clipped||undefined};

  const{dayIdx,person,filmIdx}=editTarget;
  if(filmIdx===-1){
    DAYS[dayIdx][person].push(film);
  } else {
    DAYS[dayIdx][person][filmIdx]=film;
  }
  // startH 자동 조정
  const allStarts=([...DAYS[dayIdx].ha,...DAYS[dayIdx].sy]).map(f=>f.start);
  if(allStarts.length) DAYS[dayIdx].startH=Math.floor(Math.min(...allStarts)/60);

  closePopupDirect();
  render();
}

function deleteFilm(){
  const{dayIdx,person,filmIdx}=editTarget;
  DAYS[dayIdx][person].splice(filmIdx,1);
  closePopupDirect();
  render();
}

function addDay(){
  const label=prompt('날짜 입력 (예: 5/6 수)');
  if(!label)return;
  DAYS.push({label,startH:10,ha:[],sy:[]});
  activeDay=DAYS.length-1;
  render();
}

function mkCol(films,other,totalH,startH,dayIdx,person){
  const px=totalH*PX;
  const sorted=[...films].map((f,i)=>({...f,_i:i})).sort((a,b)=>a.start-b.start);
  let s=`<div class="col" style="height:${px}px;">`;
  for(let i=0;i<=totalH;i++){const mj=(startH+i)%6===0;s+=`<div class="hl${mj?' mj':''}" style="top:${i*PX}px;"></div>`;}
  for(let i=0;i<sorted.length-1;i++){
    const gm=sorted[i+1].start-sorted[i].end;
    if(gm>0){const t=(sorted[i].end/60-startH)*PX,gh=(gm/60)*PX;
      if(gh>=12)s+=`<div class="gb" style="top:${t}px;height:${gh}px;">${gh>=18?`<span class="gl">${fmtG(gm)}</span>`:''}</div>`;}
  }
  films.forEach((f,fi)=>{
    const ce=Math.min(f.end,24*60),t=(f.start/60-startH)*PX;
    const fh=f.clipped?Math.max(((ce-f.start)/60)*PX,48):Math.max(((ce-f.start)/60)*PX,22);
    const clash=other.some(o=>overlaps(f,o)&&o.title!==f.title);
    s+=`<div class="fb ${f.col}${f.clipped?' clipped':''}${clash?' clash-ring':''}" style="top:${t}px;height:${fh}px;" onclick="openPopup(${dayIdx},'${person}',${fi})">
      <div class="ft">${f.title}</div>
      ${fh>=26?`<div class="fv">${f.venue}</div>`:''}
      ${fh>=38?`<div class="fm">${f.time}</div>`:''}
      ${fh>=50?`<div class="fbg">${f.badge}</div>`:''}
    </div>`;
  });
  return s+'</div>';
}

function mkEmpty(totalH,dayIdx,person){
  const px=totalH*PX;
  let s=`<div class="ec" style="height:${px}px;">`;
  for(let i=0;i<=totalH;i++)s+=`<div class="hl" style="top:${i*PX}px;"></div>`;
  return s+`<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:11px;color:#bbb;">일정 없음</div></div>`;
}

function mkPanel(day,i,ai){
  const all=[...day.ha,...day.sy];
  const endH=all.length?Math.min(24,Math.max(...all.map(f=>Math.ceil(Math.min(f.end,1440)/60)))):day.startH+6;
  const totalH=endH-day.startH;
  const clashes=[];
  day.ha.forEach(fa=>day.sy.forEach(fb=>{
    if(overlaps(fa,fb)&&fa.title!==fb.title){
      const k=[fa.title,fb.title].sort().join('|');
      if(!clashes.find(c=>c.k===k))clashes.push({k,ha:fa.title,sy:fb.title});
    }
  }));
  const together=new Set();
  day.ha.forEach(fa=>{if(day.sy.some(fb=>fa.title===fb.title))together.add(fa.title);});
  const hm=day.ha.reduce((s,f)=>s+Math.min(f.end,24*60)-f.start,0);
  const sm=day.sy.reduce((s,f)=>s+Math.min(f.end,24*60)-f.start,0);
  const haClipped=day.ha.find(f=>f.clipped);
  const syClipped=day.sy.find(f=>f.clipped);
  let info='';
  if(clashes.length)info=`<div class="ib ck">겹침 주의: ${clashes.map(c=>`${c.ha} ↔ ${c.sy}`).join(' / ')}</div>`;
  else if(day.ha.length&&day.sy.length)info=`<div class="ib ok">겹치는 영화 없음 — 동선 OK!</div>`;
  else info=`<div class="ib sl">${!day.sy.length?'세윤':!day.ha.length?'하영':''} 일정 없는 날</div>`;
  const tog=together.size?`<div class="tb">같이 보는 영화: ${[...together].join(' · ')}</div>`:'';
  const haC=day.ha.length?mkCol(day.ha,day.sy,totalH,day.startH,i,'ha'):mkEmpty(totalH,i,'ha');
  const syC=day.sy.length?mkCol(day.sy,day.ha,totalH,day.startH,i,'sy'):mkEmpty(totalH,i,'sy');
  let tails='';
  if(haClipped||syClipped){
    tails=`<div style="display:grid;grid-template-columns:36px 1fr 1fr;gap:4px;margin-top:0;">
      <div></div>
      ${haClipped?`<div class="fb cam night-tail"><div style="font-size:9px;opacity:0.7;">↳ 익일 05:27까지 · ${haClipped.venue}</div></div>`:'<div></div>'}
      ${syClipped?`<div class="fb cam night-tail"><div style="font-size:9px;opacity:0.7;">↳ 익일 05:27까지 · ${syClipped.venue}</div></div>`:'<div></div>'}
    </div>`;
  }
  return `<div class="panel ${i===ai?'active':''}">
    <div class="col-headers"><div></div><div class="ch cha">하영</div><div class="ch chs">세윤</div></div>
    <div class="tl-wrap">
      <div class="ax">${Array.from({length:totalH+1},(_,j)=>{const h=day.startH+j;return`<div class="tk" style="height:${PX}px;">${h<24?h+'시':''}</div>`;}).join('')}</div>
      <div class="cols">${haC}${syC}</div>
    </div>
    ${tails}
    <div style="display:grid;grid-template-columns:36px 1fr 1fr;gap:4px;margin-top:8px;">
      <div></div>
      <button class="add-btn" onclick="openPopup(${i},'ha',-1)">+ 하영 추가</button>
      <button class="add-btn" onclick="openPopup(${i},'sy',-1)">+ 세윤 추가</button>
    </div>
    <div class="sr"><div></div>
      ${day.ha.length?`<div class="sc"><strong>${Math.floor(hm/60)}시간 ${hm%60}분</strong>${day.ha.length}편</div>`:`<div class="se">일정 없음</div>`}
      ${day.sy.length?`<div class="sc"><strong>${Math.floor(sm/60)}시간 ${sm%60}분</strong>${day.sy.length}편</div>`:`<div class="se">일정 없음</div>`}
    </div>
    ${info}${tog}
  </div>`;
}

function render(){
  document.getElementById('tabs').innerHTML=DAYS.map((d,i)=>
    `<button class="tab ${i===activeDay?'active':''}" onclick="sw(${i})">${d.label}</button>`
  ).join('');
  document.getElementById('panels').innerHTML=DAYS.map((d,i)=>mkPanel(d,i,activeDay)).join('');
}
function sw(i){activeDay=i;render();}
render();
</script>
</body>
</html>
